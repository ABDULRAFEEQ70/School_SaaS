plugin: aws_ec2
regions:
  - us-east-1
filters:
  instance-state-name: running
  tag:Environment: production
  tag:Project: school-saas
 keyed_groups:
  - key: tags.Environment
    prefix: env_
  - key: tags.Name
    prefix: name_
  - key: tags.Application
    prefix: app_
  - key: availability_zone
    prefix: az_
hostnames:
  - private-ip-address
  - tag:Name
  - dns-name
compose:
  ansible_host: private_ip_address
  ansible_user: ec2-user
  ansible_ssh_private_key_file: ~/.ssh/school-saas-key.pem
  ansible_python_interpreter: /usr/bin/python3
vars_files:
  - group_vars/all.yml
  - group_vars/production.yml
