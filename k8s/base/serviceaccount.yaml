apiVersion: v1
kind: ServiceAccount
metadata:
  name: school-saas
  namespace: school-saas
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/school-saas-eks-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: school-saas-role
  namespace: school-saas
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: school-saas-rolebinding
  namespace: school-saas
subjects:
- kind: ServiceAccount
  name: school-saas
  namespace: school-saas
roleRef:
  kind: Role
  name: school-saas-role
  apiGroup: rbac.authorization.k8s.io
