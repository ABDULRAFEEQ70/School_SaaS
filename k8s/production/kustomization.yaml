apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-saas

resources:
- ../../base

images:
- name: 123456789012.dkr.ecr.us-east-1.amazonaws.com/school-saas
  newName: 123456789012.dkr.ecr.us-east-1.amazonaws.com/school-saas
  newTag: v1.0.0

replicas:
- name: school-saas-app
  count: 3

patchesStrategicMerge:
- |-
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: school-saas-app
  spec:
    template:
      spec:
        containers:
        - name: app
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

commonLabels:
  environment: production
